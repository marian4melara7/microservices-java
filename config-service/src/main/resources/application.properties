# =============================================
# config-service
# =============================================

spring.application.name=config-service
server.port=8888

spring.cloud.config.server.git.uri=https://github.com/marian4melara7/microservices-java.git
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.search-paths=configs/{application}

# Eureka Client - Self Registration
eureka.client.service-url.default-zone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.client.healthcheck.enabled=true
eureka.instance.metadata-map.github.repo=marian4melara7/Service-Registry-Health-Check-e-Resili-ncia-em-Microsservi-os

# Actuator - Health Check API Pattern
management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true

# Info Endpoint
info.app.name=${spring.application.name}
info.app.description=Config Service - Servidor de configuração centralizado
info.app.autor=Mariana Melara / RA: 1136271